<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0e42"/>
      <stop offset="100%" stop-color="#c4248f"/>
    </linearGradient>
    <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="16" height="630" fill="#ffffff" fill-opacity="0.30"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">

    <!-- Suréligne -->
    <text x="616" y="118" font-size="36" font-weight="800" fill="#ffffff" fill-opacity="0.82" letter-spacing="0.16em">PAY RENT, TAXES &amp; BILLS BY CARD</text>

    <!-- Marque -->
    <text x="616" y="232" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">CHEXY</text>
    <text x="616" y="292" font-size="44" font-weight="700" fill="#ffffff" fill-opacity="0.90" letter-spacing="0.10em">REFERRAL LINK</text>

    <!-- HÉROS : capsule blanche opaque, $20 en magenta foncé, ultra net en miniature -->
    <g transform="translate(616, 470)" filter="url(#cardshadow)">
      <rect x="-340" y="-78" width="680" height="156" rx="78" fill="#ffffff"/>
      <text x="0" y="30" font-size="92" font-weight="900" fill="#c4248f" letter-spacing="0.01em">GET $20</text>
    </g>

    <!-- Sous-ligne de soutien -->
    <text x="616" y="600" font-size="32" font-weight="700" fill="#ffffff" fill-opacity="0.86" letter-spacing="0.02em">on your first payment · earn card points</text>

  </g>
</svg>
