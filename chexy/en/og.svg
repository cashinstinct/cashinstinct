<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4a1a9e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">
    <text x="600" y="92" font-size="34" font-weight="700" fill-opacity="0.85" letter-spacing="0.14em">PAY TAXES &amp; BILLS BY CARD</text>
    <text x="600" y="185" font-size="92" font-weight="900" letter-spacing="-0.01em">CHEXY</text>
    <text x="600" y="250" font-size="48" font-weight="700" fill-opacity="0.92" letter-spacing="0.08em">REFERRAL LINK</text>
    <!-- lien dans capsule blanche avec ombre -->
    <g transform="translate(600, 405)" filter="url(#shadow)">
      <rect x="-470" y="-62" width="940" height="124" rx="20" fill="#ffffff"/>
      <text x="0" y="16" font-size="46" font-weight="900" fill="#5921b8" letter-spacing="0.01em">chexy.app.link/REF-WDTW5Q</text>
    </g>
    <!-- bonus en bandeau accent -->
    <g transform="translate(600, 558)">
      <rect x="-270" y="-50" width="540" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">$20 Bonus</text>
    </g>
  </g>
</svg>
