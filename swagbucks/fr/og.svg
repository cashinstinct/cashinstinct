<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3d7a"/>
      <stop offset="100%" stop-color="#002451"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">

    <!-- logo Swagbucks -->
    <g transform="translate(600, 100)">
      <circle cx="0" cy="0" r="46" fill="white" stroke="none"/>
      <polygon points="-18,-8 -5,-23 20,-23 7,-8" fill="#002451" />
      <polygon points="-7,8 6,-7 31,-7 18,8" fill="#002451" />
      <polygon points="-7,8 7,-8 20,-8 6,7" fill="#002451" />
    </g>

    <text x="600" y="220" font-size="92" font-weight="900" letter-spacing="0.02em">SWAGBUCKS</text>

    <text x="600" y="285" font-size="48" font-weight="700" fill-opacity="0.92" letter-spacing="0.09em">RÉCOMPENSES · LIEN DE PARRAINAGE</text>

    <!-- lien dans capsule blanche avec ombre -->
    <g transform="translate(600, 415)" filter="url(#shadow)">
      <rect x="-540" y="-62" width="1080" height="124" rx="20" fill="#ffffff"/>
      <text x="0" y="16" font-size="44" font-weight="900" fill="#002451" letter-spacing="0.01em">swagbucks.com/profile/Cashinstinct</text>
    </g>

    <!-- bonus en bandeau accent -->
    <g transform="translate(600, 558)">
      <rect x="-220" y="-50" width="440" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">Bonus de 10 $</text>
    </g>

  </g>
</svg>
