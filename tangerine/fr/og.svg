<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ed6a00"/>
    </linearGradient>
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (largeur gabarit v3 — ne pas réduire) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- overline : décrit la CONDITION réelle de la Clé Orange (pas de paie requise),
         évite la confusion avec la promo chèque 250 $ (qui exige dépôt de paie) -->
    <text x="618" y="98" font-size="37" font-weight="800" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.08em">ÉPARGNE · SANS DÉPÔT DE PAIE</text>
    <!-- marque : 124px (nom long TANGERINE, descendu sous 150) -->
    <text x="618" y="218" font-size="124" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">TANGERINE</text>
    <!-- sous-marque -->
    <text x="618" y="288" font-size="50" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.06em">CLÉ ORANGE (PARRAINAGE)</text>
    <!-- HÉROS = bénéfice : 50 $ = montant Clé Orange (PAS 250 $ promo chèque).
         Capsule BLANCHE OPAQUE (jamais fill-opacity ; x = -width/2 ; élargie 720 pour CTA FR long) -->
    <g transform="translate(618, 410)" filter="url(#cardshadow)">
      <rect x="-360" y="-66" width="720" height="132" rx="66" fill="#ffffff"/>
      <text x="0" y="28" font-size="78" font-weight="900" fill="#ed6a00" letter-spacing="0.01em">PRIME DE 50 $</text>
    </g>
    <!-- capsule CODE dédiée (programme à code — code = info clé, doit rester) -->
    <g transform="translate(618, 540)">
      <rect x="-280" y="-44" width="560" height="88" rx="44" fill="#ffffff" fill-opacity="0.18"/>
      <text x="0" y="22" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="0.04em">14130944S1</text>
    </g>
  </g>
</svg>
