<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ed6a00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">

    <text x="600" y="92" font-size="34" font-weight="700" fill-opacity="0.85" letter-spacing="0.18em">COMPTE CHÈQUE ET ÉPARGNE</text>

    <text x="600" y="185" font-size="92" font-weight="900" letter-spacing="-0.01em">TANGERINE</text>

    <text x="600" y="250" font-size="48" font-weight="700" fill-opacity="0.92" letter-spacing="0.08em">CLÉ ORANGE (PARRAINAGE)</text>

    <!-- code : capsule élargie 760, centrée -->
    <g transform="translate(600, 405)" filter="url(#shadow)">
      <rect x="-380" y="-72" width="760" height="144" rx="22" fill="#ffffff"/>
      <text x="0" y="26" font-size="100" font-weight="900" fill="#ed6a00" letter-spacing="0.04em">14130944S1</text>
    </g>

    <!-- prime : bandeau élargi 600, centré -->
    <g transform="translate(600, 558)">
      <rect x="-300" y="-50" width="600" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">Prime de 50 $ CAD</text>
    </g>

  </g>
</svg>
