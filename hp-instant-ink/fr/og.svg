<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
<title>Offre de parrainage HP Instant Ink - 1 mois gratuit avec le code SVdn7</title>
  <defs>
    <!-- gradient marque HP Instant Ink (bleu) : coin haut-gauche -> bas-droite -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fe0"/>
      <stop offset="100%" stop-color="#0047b3"/>
    </linearGradient>
    <!-- ombre portée capsules héros -->
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- overline -->
    <text x="618" y="92" font-size="36" font-weight="800" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.08em">LIVRAISON D'ENCRE AUTOMATIQUE</text>
    <!-- marque -->
    <text x="618" y="200" font-size="100" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">HP INSTANT INK</text>
    <!-- sous-marque -->
    <text x="618" y="262" font-size="46" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.06em">CODE DE PARRAINAGE</text>
    <!-- CAPSULE 1 (bénéfice) : BLANCHE OPAQUE, jamais fill-opacity ; largeur 700, x = -350 -->
    <g transform="translate(618, 378)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="22" font-size="68" font-weight="900" fill="#0052cc" letter-spacing="0.01em">1 MOIS GRATUIT</text>
    </g>
    <!-- CAPSULE 2 (code héros) : BLANCHE OPAQUE, même largeur 700 pour alignement ;
         code court (5 car.) → texte agrandi à 110px pour bien remplir la capsule
         (un code court dans une capsule pleine largeur flotte sinon — leçon SVdn7 v1) -->
    <g transform="translate(618, 530)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="28" font-size="110" font-weight="900" fill="#0052cc" letter-spacing="0.02em">SVdn7</text>
    </g>
  </g>
</svg>
