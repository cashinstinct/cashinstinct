<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fe0"/>
      <stop offset="100%" stop-color="#0047b3"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    <!-- overline -->
    <text x="618" y="100" font-size="38" font-weight="800" fill-opacity="0.85" letter-spacing="0.14em">AUTOMATIC INK DELIVERY</text>
    <!-- marque -->
    <text x="618" y="200" font-size="92" font-weight="900" letter-spacing="-0.01em">HP INSTANT INK</text>
    <!-- sous-marque -->
    <text x="618" y="262" font-size="46" font-weight="700" fill-opacity="0.92" letter-spacing="0.08em">REFER-A-FRIEND CODE</text>
    <!-- HÉROS = code (programme à code) : capsule BLANCHE OPAQUE, x = -width/2 -->
    <g transform="translate(618, 418)" filter="url(#shadow)">
      <rect x="-360" y="-86" width="720" height="172" rx="86" fill="#ffffff"/>
      <text x="0" y="34" font-size="104" font-weight="900" fill="#0052cc" letter-spacing="0.02em">SVdn7</text>
    </g>
    <!-- footer = bénéfice, court, pas en capsule (gabarit v3 : footer = texte simple) -->
    <text x="618" y="572" font-size="40" font-weight="800" fill-opacity="0.92" letter-spacing="0.04em">1 FREE MONTH</text>
  </g>
</svg>
