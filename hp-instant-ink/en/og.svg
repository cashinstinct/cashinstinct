<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fe0"/>
      <stop offset="100%" stop-color="#0047b3"/>
    </linearGradient>
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- overline -->
    <text x="618" y="92" font-size="38" font-weight="800" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.12em">AUTOMATIC INK DELIVERY</text>
    <!-- marque -->
    <text x="618" y="186" font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">HP INSTANT INK</text>
    <!-- sous-marque -->
    <text x="618" y="246" font-size="42" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.06em">REFER-A-FRIEND CODE</text>
    <!-- HÉROS = code : capsule BLANCHE OPAQUE, x = -width/2 ; code à 150px comme la marque (court = doit dominer) -->
    <g transform="translate(618, 410)" filter="url(#cardshadow)">
      <rect x="-340" y="-100" width="680" height="200" rx="100" fill="#ffffff"/>
      <text x="0" y="48" font-size="150" font-weight="900" fill="#0052cc" letter-spacing="0.02em">SVdn7</text>
    </g>
    <!-- footer = bénéfice -->
    <text x="618" y="570" font-size="46" font-weight="800" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.04em">1 FREE MONTH</text>
  </g>
</svg>
