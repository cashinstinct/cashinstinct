<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#e8410a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- accent bar gauche -->
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">

    <!-- pré-titre discret -->
    <text x="600" y="92" font-size="34" font-weight="700" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.22em">AUTOCOLLANTS &amp; PLUS</text>
    
    <!-- titre principal -->
    <text x="600" y="180" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">STICKER MULE</text>

    <!-- sous-titre -->
    <text x="600" y="248" font-size="50" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.14em">CODE DE PARRAINAGE</text>

    <!-- code dans capsule blanche avec ombre -->
    <g transform="translate(600, 400)" filter="url(#shadow)">
      <rect x="-430" y="-72" width="860" height="144" rx="22" fill="#ffffff"/>
      <text x="0" y="26" font-size="98" font-weight="900" fill="#e8410a" letter-spacing="0.04em">CASHINSTINCT</text>
    </g>

    <!-- crédit en bandeau accent largeur plus grande qu'en anglais -->
   <g transform="translate(600, 545)">
  <rect x="-380" y="-52" width="760" height="98" rx="49" fill="#ffffff" fill-opacity="0.16"/>
  <text x="0" y="26" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="0.02em">CRÉDIT 12,50 $ CAD</text>
  </g>

  </g>
</svg>
