<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- gradient orange StickerMule -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#e8410a"/>
    </linearGradient>
    <!-- ombre portée de la capsule du code -->
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- pré-titre discret -->
    <text x="618" y="104" font-size="40" font-weight="800" fill="#ffffff" fill-opacity="0.85" letter-spacing="0.10em">STICKERS CUSTOM &amp; PLUS</text>
    <!-- marque : 118px (nom long "STICKER MULE", descendu sous 150) -->
    <text x="618" y="232" font-size="118" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">STICKER MULE</text>
    <!-- sous-marque -->
    <text x="618" y="300" font-size="48" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.08em">CODE DE PARRAINAGE</text>
    <!-- CODE en héros : capsule BLANCHE OPAQUE (jamais fill-opacity), texte orange ; x = -width/2 (880/2=440) -->
    <g transform="translate(618, 440)" filter="url(#cardshadow)">
      <rect x="-440" y="-80" width="880" height="160" rx="80" fill="#ffffff"/>
      <text x="0" y="30" font-size="96" font-weight="900" fill="#e8410a" letter-spacing="0.02em">CASHINSTINCT</text>
    </g>
    <!-- footer court : crédit seul (le "1re commande" va dans le texte du post) ; crédit fixe par devise, jamais converti -->
    <text x="618" y="590" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="0.02em">Crédit 12,50 $ CAD</text>
  </g>
</svg>


