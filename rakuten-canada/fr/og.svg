<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a1fe0"/>
      <stop offset="100%" stop-color="#5a00a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">

    <!-- logo R Rakuten -->
    <g transform="translate(600, 100)">
      <circle cx="0" cy="0" r="46" fill="white" stroke="none"/>
      <path d="M-15 -20 L-15 20 M-15 0 L10 0 C 20 0 20 -20 10 -20 L-15 -20 M5 0 L20 20" fill="none" stroke="#6c00c8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="600" y="220" font-size="92" font-weight="900" letter-spacing="0.02em">RAKUTEN</text>

    <text x="600" y="285" font-size="48" font-weight="700" fill-opacity="0.92" letter-spacing="0.09em">REMISES · LIEN DE PARRAINAGE</text>

    <!-- lien dans capsule blanche avec ombre -->
    <g transform="translate(600, 415)" filter="url(#shadow)">
      <rect x="-500" y="-62" width="1000" height="124" rx="20" fill="#ffffff"/>
      <text x="0" y="16" font-size="50" font-weight="900" fill="#6c00c8" letter-spacing="0.01em">rakuten.ca/r/cashinstinct</text>
    </g>

    <!-- bonus en bandeau accent -->
    <g transform="translate(600, 558)">
      <rect x="-250" y="-50" width="500" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">Bonus de 30 $</text>
    </g>

  </g>
</svg>
