<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c93b36"/>
      <stop offset="100%" stop-color="#a02824"/>
    </linearGradient>
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- logo hexagone : y=70, remonté pour dégager l'espace vers EBOX -->
    <g transform="translate(618, 70)">
      <path d="M-32 -16 L-32 16 L0 32 L32 16 L32 -16 L0 -32 Z" fill="none" stroke="#ffffff" stroke-width="9" stroke-linejoin="round"/>
      <path d="M-16 -8 L-16 8 L0 16 L16 8 L16 -8 L0 -16 Z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
    </g>
    <!-- marque : y=195, espace logo->texte élargi de ~32px à ~93px (top logo=38, bottom logo=102, baseline texte=195) -->
    <text x="618" y="195" font-size="108" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">EBOX</text>
    <!-- sous-marque : grossie 42->54px (taille standard gabarit), y ajusté -->
    <text x="618" y="262" font-size="54" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.08em">CODE D'AMI</text>
    <!-- CAPSULE 1 (bénéfice) : BLANCHE OPAQUE, jamais fill-opacity ; largeur 700, x=-350 -->
    <g transform="translate(618, 395)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="22" font-size="72" font-weight="900" fill="#a02824" letter-spacing="0.01em">CRÉDIT DE 25 $</text>
    </g>
    <!-- CAPSULE 2 (code héros) : BLANCHE OPAQUE ; code court (5 car.) -> texte 110px -->
    <g transform="translate(618, 547)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="28" font-size="110" font-weight="900" fill="#a02824" letter-spacing="0.03em">GE911</text>
    </g>
  </g>
</svg>
