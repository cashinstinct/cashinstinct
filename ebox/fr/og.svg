<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c93b36"/>
      <stop offset="100%" stop-color="#a02824"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">

    <!-- hexagone EBOX -->
    <g transform="translate(600, 95)">
      <path d="M-42 -21 L-42 21 L0 42 L42 21 L42 -21 L0 -42 Z" fill="none" stroke="white" stroke-width="11" stroke-linejoin="round"/>
      <path d="M-21 -10.5 L-21 10.5 L0 21 L21 10.5 L21 -10.5 L0 -21 Z" fill="none" stroke="white" stroke-width="7" stroke-linejoin="round"/>
    </g>

    <text x="600" y="235" font-size="100" font-weight="900" letter-spacing="0.04em">EBOX</text>
    <text x="600" y="308" font-size="60" font-weight="700" fill-opacity="0.92" letter-spacing="0.14em">CODE D'AMI</text>

    <!-- code dans capsule blanche avec ombre -->
    <g transform="translate(600, 425)" filter="url(#shadow)">
      <rect x="-260" y="-68" width="520" height="136" rx="20" fill="#ffffff"/>
      <text x="0" y="24" font-size="104" font-weight="900" fill="#a02824" letter-spacing="0.05em">GE911</text>
    </g>

    <!-- crédit en bandeau accent -->
    <g transform="translate(600, 565)">
      <rect x="-260" y="-50" width="520" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">25 $ de crédit</text>
    </g>

  </g>
</svg>
