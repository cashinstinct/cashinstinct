<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <title>EBOX referral offer - $25 credit with code GE911</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c93b36"/>
      <stop offset="100%" stop-color="#a02824"/>
    </linearGradient>
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- logo hexagone -->
    <g transform="translate(618, 75)">
      <path d="M-32 -16 L-32 16 L0 32 L32 16 L32 -16 L0 -32 Z" fill="none" stroke="#ffffff" stroke-width="9" stroke-linejoin="round"/>
      <path d="M-16 -8 L-16 8 L0 16 L16 8 L16 -8 L0 -16 Z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
    </g>
    <!-- marque -->
    <text x="618" y="195" font-size="108" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">EBOX</text>
    <!-- sous-marque : 70px (au-dessus du standard 54px pour combler le vide vers la capsule) -->
    <text x="618" y="270" font-size="70" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.06em">REFERRAL CODE</text>
    <!-- CAPSULE 1 (bénéfice) : BLANCHE OPAQUE, jamais fill-opacity -->
    <g transform="translate(618, 368)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="22" font-size="72" font-weight="900" fill="#a02824" letter-spacing="0.01em">$25 CREDIT</text>
    </g>
    <!-- CAPSULE 2 (code héros) : BLANCHE OPAQUE ; code court -> 95px pour rester dans la capsule -->
    <g transform="translate(618, 520)" filter="url(#cardshadow)">
      <rect x="-350" y="-58" width="700" height="116" rx="58" fill="#ffffff"/>
      <text x="0" y="26" font-size="95" font-weight="900" fill="#a02824" letter-spacing="0.02em">GE911</text>
    </g>
  </g>
</svg>
