<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- gradient de marque EBOX : rouge -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c93b36"/>
      <stop offset="100%" stop-color="#a02824"/>
    </linearGradient>
    <!-- ombre portée de la capsule héros -->
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- barre latérale 18px (gabarit v3) -->
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle">

    <!-- hexagone EBOX (logo simplifié) : descendu à y=108 pour respirer en haut (marge verticale ~45px avant) -->
    <g transform="translate(618, 108)">
      <path d="M-38 -19 L-38 19 L0 38 L38 19 L38 -19 L0 -38 Z" fill="none" stroke="#ffffff" stroke-width="10" stroke-linejoin="round"/>
      <path d="M-19 -9.5 L-19 9.5 L0 19 L19 9.5 L19 -9.5 L0 -19 Z" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- marque -->
    <text x="618" y="252" font-size="124" font-weight="900" fill="#ffffff" letter-spacing="-0.01em">EBOX</text>
    <!-- sous-marque -->
    <text x="618" y="320" font-size="46" font-weight="700" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.10em">REFERRAL CODE</text>

    <!-- HÉROS = code GE911 : capsule BLANCHE OPAQUE, largeur 720px alignée gabarit standard ; x = -width/2 -->
    <g transform="translate(618, 458)" filter="url(#cardshadow)">
      <rect x="-360" y="-86" width="720" height="172" rx="86" fill="#ffffff"/>
      <text x="0" y="34" font-size="124" font-weight="900" fill="#a02824" letter-spacing="0.03em">GE911</text>
    </g>

    <!-- footer : réduit à 46px pour rester dans les marges 70px (était 54, trop large pour "$25 Credit") -->
    <text x="618" y="595" font-size="46" font-weight="800" fill="#ffffff" fill-opacity="0.92" letter-spacing="0.02em">$25 Credit</text>
  </g>
</svg>
