<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b9248"/>
      <stop offset="100%" stop-color="#4a6b30"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#ffffff" fill-opacity="0.25"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="white">

    <!-- étoile Achieva -->
    <g transform="translate(600, 92)">
      <path d="M0 -42 L11 -13 L42 -13 L17 8 L25 38 L0 21 L-25 38 L-17 8 L-42 -13 L-11 -13 Z" fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="round"/>
    </g>

    <text x="600" y="200" font-size="88" font-weight="900" letter-spacing="-0.01em">ACHIEVA FINANCIAL</text>

    <text x="600" y="265" font-size="48" font-weight="700" fill-opacity="0.92" letter-spacing="0.10em">PETAL CODE (REFERRAL)</text>

    <!-- code dans capsule blanche avec ombre -->
    <g transform="translate(600, 415)" filter="url(#shadow)">
      <rect x="-360" y="-72" width="720" height="144" rx="22" fill="#ffffff"/>
      <text x="0" y="26" font-size="100" font-weight="900" fill="#4a6b30" letter-spacing="0.04em">V381566198</text>
    </g>

    <!-- bonus en bandeau accent -->
    <g transform="translate(600, 558)">
      <rect x="-200" y="-50" width="400" height="94" rx="47" fill="#ffffff" fill-opacity="0.16"/>
      <text x="0" y="26" font-size="60" font-weight="900" letter-spacing="0.02em">$25 BONUS</text>
    </g>

  </g>
</svg>
