<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4d94a"/>
      <stop offset="100%" stop-color="#9cc22e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="630" fill="#1a2e12" fill-opacity="0.20"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" text-anchor="middle" fill="#14210d">

    <text x="600" y="170" font-size="92" font-weight="900" letter-spacing="-0.01em">ACHIEVA FINANCIAL</text>

    <text x="600" y="240" font-size="48" font-weight="700" fill-opacity="0.80" letter-spacing="0.07em">CODE PETAL (PARRAINAGE)</text>

    <!-- code dans capsule blanche avec ombre -->
    <g transform="translate(600, 400)" filter="url(#shadow)">
      <rect x="-360" y="-72" width="720" height="144" rx="22" fill="#ffffff"/>
      <text x="0" y="26" font-size="100" font-weight="900" fill="#7aa017" letter-spacing="0.04em">V381566198</text>
    </g>

    <!-- bonus en bandeau accent foncé -->
    <g transform="translate(600, 555)">
      <rect x="-220" y="-50" width="440" height="94" rx="47" fill="#14210d" fill-opacity="0.85"/>
      <text x="0" y="26" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="0.02em">Bonus de 25 $</text>
    </g>

  </g>
