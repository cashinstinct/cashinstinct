name: Test téléchargement EB Games

on:
  workflow_dispatch:

jobs:
  test-download:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le CSV
        run: |
          curl \
            --fail \
            --location \
            --retry 3 \
            --user-agent "Mozilla/5.0" \
            --output Trade_Values.csv \
            "https://www.ebgames.ca/Views/Locale/Content/Microsites/trade-value-lookup/data/Trade_Values.csv"

      - name: Vérifier le fichier
        run: |
          ls -lh Trade_Values.csv
          echo "Nombre de lignes :"
          wc -l Trade_Values.csv
          echo "Premières lignes :"
          head -n 5 Trade_Values.csv

      - name: Conserver le CSV comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: trade-values-test
          path: Trade_Values.csv
