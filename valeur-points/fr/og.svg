<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient de marque : teal du site -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#058373"/>
      <stop offset="100%" stop-color="#022e28"/>
    </linearGradient>
    
    <!-- Ombre portée de la capsule centrale -->
    <filter id="cardshadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Arrière-plan et barre latérale -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="18" height="630" fill="#ffffff" fill-opacity="0.30"/>

  <!-- Capsule centrale blanche (Gabarit unifié outils Cash Instinct) -->
  <rect x="129" y="140" width="960" height="350" rx="32" fill="#ffffff" filter="url(#cardshadow)"/>

  <!-- Groupe de texte (centré sur 609 pour compenser la barre latérale) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    
    <!-- Surtitre haut -->
    <text x="609" y="90" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="0.15em">CASH INSTINCT</text>

    <!-- Titre principal dans la capsule -->
    <text x="609" y="245" font-size="80" font-weight="900" fill="#0f1c1c" letter-spacing="-0.02em">VALEUR DES POINTS</text>
    
    <!-- L'accroche / L'écart de valeur -->
    <text x="609" y="345" font-size="90" font-weight="900" fill="#058373" letter-spacing="-0.01em">0,07¢ à 2,29¢</text>
    
    <!-- Pastille / Tag dans la capsule -->
    <rect x="429" y="380" width="360" height="60" rx="30" fill="#eaf5f5" />
    <text x="609" y="422" font-size="28" font-weight="800" fill="#036256" letter-spacing="0.08em">CALCULATRICE</text>

    <!-- Sous-titre bas -->
    <text x="609" y="570" font-size="36" font-weight="700" fill="#ffffff" fill-opacity="0.9" letter-spacing="0.05em">7 PROGRAMMES CANADIENS</text>
  </g>
</svg>
